<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌌 Dải Thiên Hà - Hand Control</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --cosmic-dark: #00020a;
  --core-white: #fff8f0;
  --core-pink: #ffb3c6;
  --arm-red: #e8446a;
  --arm-pink: #d63a8a;
  --mid-purple: #8b22d4;
  --outer-blue: #2255c8;
  --deep-blue: #0d1b6e;
  --nebula-cloud: #3a1a7a;
  --glow-cyan: #22d3ee;
  --text-dim: rgba(180,190,210,0.7);
}

body {
  background: var(--cosmic-dark);
  color: #e2e8f0;
  font-family: 'Rajdhani', sans-serif;
  overflow: hidden;
  height: 100dvh;
  width: 100vw;
}

#galaxy-canvas {
  position: fixed;
  inset: 0;
  z-index: 1;
}

#cam-video {
  position: fixed;
  bottom: 16px;
  left: 16px;
  width: 200px;
  height: 130px;
  border-radius: 12px;
  border: 1px solid rgba(56,189,248,0.3);
  object-fit: cover;
  transform: scaleX(-1);
  z-index: 10;
  opacity: 0.85;
}

#hand-canvas {
  position: fixed;
  bottom: 16px;
  left: 16px;
  width: 200px;
  height: 130px;
  border-radius: 12px;
  z-index: 11;
  pointer-events: none;
}

#hud {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 20;
  padding: 16px 20px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  background: linear-gradient(to bottom, rgba(0,2,10,0.9) 0%, transparent 100%);
}

.hud-title {
  font-family: 'Orbitron', monospace;
  font-weight: 900;
  font-size: clamp(14px, 2.5vw, 22px);
  background: linear-gradient(135deg, #ff9de2, #c084fc, #60a5fa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 2px;
}

.hud-sub {
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 2px;
}

#stats-panel {
  background: rgba(0,2,10,0.7);
  border: 1px solid rgba(140,80,255,0.25);
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 12px;
  font-family: 'Orbitron', monospace;
  min-width: 160px;
  backdrop-filter: blur(8px);
}

.stat-row {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 4px;
}

.stat-label { color: var(--text-dim); }
.stat-val { color: #c084fc; font-weight: 700; }

#gesture-badge {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 30;
  font-family: 'Orbitron', monospace;
  font-size: clamp(14px, 3vw, 20px);
  font-weight: 700;
  padding: 10px 24px;
  border-radius: 30px;
  background: rgba(80,20,160,0.4);
  border: 1px solid rgba(160,80,255,0.6);
  backdrop-filter: blur(12px);
  color: #e2e8f0;
  letter-spacing: 2px;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  text-align: center;
}

#gesture-badge.show { opacity: 1; }

#controls-guide {
  position: fixed;
  bottom: 16px;
  right: 16px;
  z-index: 20;
  background: rgba(0,2,10,0.75);
  border: 1px solid rgba(140,80,255,0.2);
  border-radius: 12px;
  padding: 12px 16px;
  font-size: 12px;
  backdrop-filter: blur(8px);
  max-width: 240px;
}

.guide-title {
  font-family: 'Orbitron', monospace;
  font-size: 10px;
  color: #c084fc;
  letter-spacing: 2px;
  margin-bottom: 8px;
  text-transform: uppercase;
}

.guide-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 5px;
  color: var(--text-dim);
  font-size: 11px;
}

.guide-icon {
  font-size: 16px;
  width: 22px;
  text-align: center;
  flex-shrink: 0;
}

#loading {
  position: fixed;
  inset: 0;
  background: var(--cosmic-dark);
  z-index: 100;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  transition: opacity 0.8s;
}

#loading.hidden { opacity: 0; pointer-events: none; }

.loader-title {
  font-family: 'Orbitron', monospace;
  font-size: clamp(18px, 4vw, 32px);
  font-weight: 900;
  background: linear-gradient(135deg, #ff9de2, #c084fc, #60a5fa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-align: center;
  letter-spacing: 3px;
}

.loader-status {
  font-size: 14px;
  color: var(--text-dim);
  letter-spacing: 2px;
  text-align: center;
}

.loader-bar-wrap {
  width: 260px;
  height: 3px;
  background: rgba(255,255,255,0.1);
  border-radius: 3px;
  overflow: hidden;
}

.loader-bar {
  height: 100%;
  background: linear-gradient(90deg, #c084fc, #f472b6);
  width: 0%;
  border-radius: 3px;
  transition: width 0.4s;
  animation: barPulse 2s ease-in-out infinite;
}

@keyframes barPulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.btn-start {
  display: none;
  font-family: 'Orbitron', monospace;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 3px;
  padding: 14px 36px;
  border-radius: 50px;
  border: 1px solid #c084fc;
  background: rgba(192,132,252,0.12);
  color: #c084fc;
  cursor: pointer;
  transition: all 0.3s;
}

.btn-start:hover {
  background: rgba(192,132,252,0.25);
  box-shadow: 0 0 30px rgba(192,132,252,0.4);
}

#fps-badge {
  position: fixed;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 25;
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  color: rgba(192,132,252,0.5);
  letter-spacing: 2px;
}

#hand-glow {
  position: fixed;
  pointer-events: none;
  z-index: 15;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(192,132,252,0.3) 0%, transparent 70%);
  border: 1px solid rgba(192,132,252,0.4);
  transform: translate(-50%, -50%);
  transition: opacity 0.2s;
  opacity: 0;
  display: none;
}
</style>
</head>
<body>

<div id="loading">
  <div class="loader-title">🌌 THIÊN HÀ<br>HAND CONTROL</div>
  <div class="loader-status" id="load-status">Đang tải MediaPipe...</div>
  <div class="loader-bar-wrap"><div class="loader-bar" id="loader-bar"></div></div>
  <button class="btn-start" id="btn-start" onclick="startExperience()">✨ BẮT ĐẦU</button>
</div>

<canvas id="galaxy-canvas"></canvas>
<video id="cam-video" autoplay muted playsinline></video>
<canvas id="hand-canvas"></canvas>
<div id="hand-glow"></div>

<div id="hud">
  <div>
    <div class="hud-title">🌌 GALAXY CONTROL</div>
    <div class="hud-sub">Hand Tracking · 3D Nebula</div>
  </div>
  <div id="stats-panel">
    <div class="stat-row"><span class="stat-label">Azimuth</span><span class="stat-val" id="s-az">0°</span></div>
    <div class="stat-row"><span class="stat-label">Elevation</span><span class="stat-val" id="s-el">25°</span></div>
    <div class="stat-row"><span class="stat-label">Zoom</span><span class="stat-val" id="s-zoom">1.0x</span></div>
    <div class="stat-row"><span class="stat-label">Gesture</span><span class="stat-val" id="s-gesture">—</span></div>
    <div class="stat-row"><span class="stat-label">Hands</span><span class="stat-val" id="s-hands">0</span></div>
  </div>
</div>

<div id="fps-badge">60 FPS</div>
<div id="gesture-badge"></div>

<div id="controls-guide">
  <div class="guide-title">✦ Controls</div>
  <div class="guide-row"><span class="guide-icon">✊</span><span>Nắm tay → Xoay thiên hà</span></div>
  <div class="guide-row"><span class="guide-icon">🤏</span><span>Véo ngón → Zoom 1 tay</span></div>
  <div class="guide-row"><span class="guide-icon">🙌</span><span>2 tay kéo ra → Zoom sâu</span></div>
  <div class="guide-row"><span class="guide-icon">🖐️</span><span>Mở tay → Trôi nổi</span></div>
  <div class="guide-row"><span class="guide-icon">✌️</span><span>Peace → Turbo orbit</span></div>
  <div class="guide-row"><span class="guide-icon">👌</span><span>OK → Reset camera</span></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── GLOBALS ───────────────────────────────────────────────────────────────
let camera3D, scene, renderer, galaxyMesh, nebulaParticles, dustCloud, coreGlow;
let azimuth = 0, elevation = 25, distance = 6;
let targetAz = 0, targetEl = 25, targetDist = 6;
let autoRotate = true;
let handDetector = null;
let lastGesture = null, gestureCooldown = 0;
let prevHandX = null, prevHandY = null;
let frameCount = 0, lastFpsTime = performance.now();
let started = false;
let videoStream = null;
let gestureTimer = null;
// Single-hand pinch zoom
let pinchStartDist = null, pinchStartZoom = null;
// Two-hand spread zoom
let twoHandStartDist = null, twoHandStartZoom = null;

const loaderBar = document.getElementById('loader-bar');
const loadStatus = document.getElementById('load-status');

// ─── THREE.JS GALAXY ──────────────────────────────────────────────────────
function initThree() {
  const canvas = document.getElementById('galaxy-canvas');
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x00020a);

  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x00020a, 0.018);

  camera3D = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
  updateCamera();

  buildGalaxy();
  buildNebulaClouds();
  buildCoreGlow();
  buildDustArms();
  buildStarField();

  window.addEventListener('resize', onResize);
}

function buildGalaxy() {
  // Dải sao xoắn ốc — màu theo ảnh model:
  // lõi: trắng ấm → hồng/đỏ → tím → xanh dương → viền tím đậm
  const N = 100000;
  const positions = new Float32Array(N * 3);
  const colors = new Float32Array(N * 3);
  const sizes = new Float32Array(N);

  const arms = 4;
  const spinFactor = 4.0;
  const spread = 0.3;

  for (let i = 0; i < N; i++) {
    const armIdx = i % arms;
    const armAngle = (armIdx / arms) * Math.PI * 2;
    const r = Math.pow(Math.random(), 0.55) * 5.8;
    const spin = r * spinFactor;
    const angle = armAngle + spin + (Math.random() - 0.5) * spread * (r * 0.5 + 0.5);

    const xSp = (Math.random() - 0.5) * spread * (r * 0.45 + 0.3);
    const ySp = (Math.random() - 0.5) * 0.22 * Math.exp(-r * 0.5);
    const zSp = (Math.random() - 0.5) * spread * (r * 0.45 + 0.3);

    positions[i*3]   = Math.cos(angle) * r + xSp;
    positions[i*3+1] = ySp;
    positions[i*3+2] = Math.sin(angle) * r + zSp;

    const t = r / 5.8;
    let cr, cg, cb;

    if (t < 0.08) {
      // Lõi: trắng sáng ấm
      cr = 1.0; cg = 0.97; cb = 0.92;
    } else if (t < 0.2) {
      // Vùng trong: trắng → hồng nhạt
      const f = (t - 0.08) / 0.12;
      cr = 1.0; cg = 0.97 - f * 0.15; cb = 0.92 - f * 0.3;
    } else if (t < 0.38) {
      // Hồng → đỏ hồng (như ảnh)
      const f = (t - 0.2) / 0.18;
      cr = 1.0 - f * 0.05; cg = 0.82 - f * 0.35; cb = 0.62 - f * 0.25;
    } else if (t < 0.55) {
      // Đỏ hồng → tím
      const f = (t - 0.38) / 0.17;
      cr = 0.95 - f * 0.35; cg = 0.47 - f * 0.2; cb = 0.37 + f * 0.45;
    } else if (t < 0.72) {
      // Tím → xanh tím
      const f = (t - 0.55) / 0.17;
      cr = 0.60 - f * 0.3; cg = 0.27 - f * 0.05; cb = 0.82 + f * 0.1;
    } else {
      // Viền: xanh tím → xanh đậm
      const f = (t - 0.72) / 0.28;
      cr = 0.30 - f * 0.18; cg = 0.22 + f * 0.05; cb = 0.92 - f * 0.25;
    }

    const bright = 0.45 + Math.random() * 0.55;
    colors[i*3]   = cr * bright;
    colors[i*3+1] = cg * bright;
    colors[i*3+2] = cb * bright;

    sizes[i] = t < 0.12 ? (0.07 + Math.random() * 0.12) : (0.012 + Math.random() * 0.038);
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(colors, 3));
  geo.setAttribute('size',     new THREE.BufferAttribute(sizes, 1));

  const mat = new THREE.ShaderMaterial({
    uniforms: {
      time: { value: 0 },
      pixelRatio: { value: renderer.getPixelRatio() }
    },
    vertexShader: `
      attribute float size;
      attribute vec3 color;
      varying vec3 vColor;
      uniform float time;
      uniform float pixelRatio;
      void main() {
        vColor = color;
        vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
        float twinkle = 0.82 + 0.18 * sin(time * 2.5 + position.x * 17.3 + position.z * 11.7);
        gl_PointSize = size * pixelRatio * (320.0 / -mvPos.z) * twinkle;
        gl_Position = projectionMatrix * mvPos;
      }
    `,
    fragmentShader: `
      varying vec3 vColor;
      void main() {
        vec2 uv = gl_PointCoord - 0.5;
        float d = length(uv);
        if (d > 0.5) discard;
        float alpha = 1.0 - smoothstep(0.08, 0.5, d);
        float glow = exp(-d * 5.5) * 0.65;
        vec3 col = vColor + glow * vec3(0.35, 0.2, 0.45);
        gl_FragColor = vec4(col, alpha * 0.92);
      }
    `,
    transparent: true,
    depthWrite: false,
    vertexColors: true,
    blending: THREE.AdditiveBlending,
  });

  galaxyMesh = new THREE.Points(geo, mat);
  scene.add(galaxyMesh);
}

function buildNebulaClouds() {
  // Đám mây nebula tím/xanh xung quanh — giống ảnh model
  const N = 2500;
  const positions = new Float32Array(N * 3);
  const colors = new Float32Array(N * 3);
  const sizes = new Float32Array(N);

  for (let i = 0; i < N; i++) {
    const angle = Math.random() * Math.PI * 2;
    const r = 1.5 + Math.pow(Math.random(), 0.7) * 5.0;
    const cloudAngle = angle + r * 3.8 + (Math.random() - 0.5) * 0.9;

    positions[i*3]   = Math.cos(cloudAngle) * r + (Math.random()-0.5) * 1.2;
    positions[i*3+1] = (Math.random()-0.5) * 0.7 * Math.exp(-r * 0.2);
    positions[i*3+2] = Math.sin(cloudAngle) * r + (Math.random()-0.5) * 1.2;

    const t = Math.random();
    if (t < 0.25) {
      // Tím sâu (như đám mây viền ngoài)
      colors[i*3]=0.28; colors[i*3+1]=0.08; colors[i*3+2]=0.55;
    } else if (t < 0.5) {
      // Xanh tím
      colors[i*3]=0.12; colors[i*3+1]=0.15; colors[i*3+2]=0.65;
    } else if (t < 0.75) {
      // Hồng tím (vùng giữa)
      colors[i*3]=0.65; colors[i*3+1]=0.18; colors[i*3+2]=0.55;
    } else {
      // Xanh dương đậm
      colors[i*3]=0.08; colors[i*3+1]=0.22; colors[i*3+2]=0.72;
    }

    sizes[i] = 0.5 + Math.random() * 2.0;
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(colors, 3));
  geo.setAttribute('size',     new THREE.BufferAttribute(sizes, 1));

  const mat = new THREE.ShaderMaterial({
    uniforms: { time: { value: 0 }, pixelRatio: { value: renderer.getPixelRatio() } },
    vertexShader: `
      attribute float size;
      attribute vec3 color;
      varying vec3 vColor;
      uniform float time;
      uniform float pixelRatio;
      void main() {
        vColor = color;
        vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
        float pulse = 0.88 + 0.12 * sin(time * 0.6 + position.x * 3.7 + position.z * 2.9);
        gl_PointSize = size * pixelRatio * (300.0 / -mvPos.z) * pulse;
        gl_Position = projectionMatrix * mvPos;
      }
    `,
    fragmentShader: `
      varying vec3 vColor;
      void main() {
        vec2 uv = gl_PointCoord - 0.5;
        float d = length(uv);
        if (d > 0.5) discard;
        float alpha = exp(-d * 2.8) * 0.45;
        gl_FragColor = vec4(vColor, alpha);
      }
    `,
    transparent: true,
    depthWrite: false,
    vertexColors: true,
    blending: THREE.AdditiveBlending,
  });

  nebulaParticles = new THREE.Points(geo, mat);
  scene.add(nebulaParticles);
}

function buildCoreGlow() {
  // Ánh sáng lõi trắng hồng (sprite lớn ở trung tâm)
  const N = 300;
  const positions = new Float32Array(N * 3);
  const colors = new Float32Array(N * 3);
  const sizes = new Float32Array(N);

  for (let i = 0; i < N; i++) {
    const angle = Math.random() * Math.PI * 2;
    const r = Math.pow(Math.random(), 1.8) * 1.2;
    positions[i*3]   = Math.cos(angle) * r + (Math.random()-0.5)*0.3;
    positions[i*3+1] = (Math.random()-0.5)*0.15;
    positions[i*3+2] = Math.sin(angle) * r + (Math.random()-0.5)*0.3;

    const t = r / 1.2;
    if (t < 0.3) {
      colors[i*3]=1.0; colors[i*3+1]=0.98; colors[i*3+2]=0.95; // trắng sáng
    } else if (t < 0.6) {
      colors[i*3]=1.0; colors[i*3+1]=0.75; colors[i*3+2]=0.8;  // hồng nhạt
    } else {
      colors[i*3]=0.95; colors[i*3+1]=0.45; colors[i*3+2]=0.65; // đỏ hồng
    }
    sizes[i] = 0.3 + Math.random() * 1.8;
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(colors, 3));
  geo.setAttribute('size',     new THREE.BufferAttribute(sizes, 1));

  const mat = new THREE.ShaderMaterial({
    uniforms: { time: { value: 0 }, pixelRatio: { value: renderer.getPixelRatio() } },
    vertexShader: `
      attribute float size;
      attribute vec3 color;
      varying vec3 vColor;
      uniform float time;
      uniform float pixelRatio;
      void main() {
        vColor = color;
        vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
        float pulse = 0.9 + 0.1 * sin(time * 1.2 + position.x * 8.0);
        gl_PointSize = size * pixelRatio * (350.0 / -mvPos.z) * pulse;
        gl_Position = projectionMatrix * mvPos;
      }
    `,
    fragmentShader: `
      varying vec3 vColor;
      void main() {
        vec2 uv = gl_PointCoord - 0.5;
        float d = length(uv);
        if (d > 0.5) discard;
        float alpha = exp(-d * 2.2) * 0.55;
        gl_FragColor = vec4(vColor, alpha);
      }
    `,
    transparent: true,
    depthWrite: false,
    vertexColors: true,
    blending: THREE.AdditiveBlending,
  });

  coreGlow = new THREE.Points(geo, mat);
  scene.add(coreGlow);
}

function buildDustArms() {
  // Bụi tối dọc theo cánh tay xoắn ốc
  const N = 4000;
  const pos = new Float32Array(N * 3);
  const col = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) {
    const arm = i % 4;
    const armA = (arm / 4) * Math.PI * 2;
    const r = 0.8 + Math.pow(Math.random(), 0.6) * 5.0;
    const spin = r * 4.0;
    const angle = armA + spin + (Math.random() - 0.5) * 0.65;
    pos[i*3]   = Math.cos(angle) * r + (Math.random()-0.5)*0.5;
    pos[i*3+1] = (Math.random()-0.5) * 0.12;
    pos[i*3+2] = Math.sin(angle) * r + (Math.random()-0.5)*0.5;
    // màu tím đen như vệt bụi trong ảnh
    col[i*3]=0.18; col[i*3+1]=0.06; col[i*3+2]=0.32;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
  const mat = new THREE.PointsMaterial({
    size: 0.14, transparent: true, opacity: 0.18,
    vertexColors: true, blending: THREE.AdditiveBlending, depthWrite: false
  });
  dustCloud = new THREE.Points(geo, mat);
  scene.add(dustCloud);
}

function buildStarField() {
  // Nền sao trắng (như ảnh: nền đen có nhiều sao trắng nhỏ)
  const N = 7000;
  const pos = new Float32Array(N * 3);
  const col = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = 50 + Math.random() * 80;
    pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    pos[i*3+2] = r * Math.cos(phi);
    // Một số sao xanh lạnh, một số trắng ấm
    const warm = Math.random() > 0.5;
    col[i*3]   = warm ? 0.9 : 0.7;
    col[i*3+1] = warm ? 0.9 : 0.75;
    col[i*3+2] = warm ? 0.85 : 1.0;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
  const mat = new THREE.PointsMaterial({
    size: 0.07, transparent: true, opacity: 0.8,
    vertexColors: true,
    blending: THREE.AdditiveBlending, depthWrite: false
  });
  scene.add(new THREE.Points(geo, mat));
}

function updateCamera() {
  const azRad = azimuth * Math.PI / 180;
  const elRad = elevation * Math.PI / 180;
  camera3D.position.set(
    distance * Math.cos(elRad) * Math.sin(azRad),
    distance * Math.sin(elRad),
    distance * Math.cos(elRad) * Math.cos(azRad)
  );
  camera3D.lookAt(0, 0, 0);
}

function onResize() {
  camera3D.aspect = window.innerWidth / window.innerHeight;
  camera3D.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// ─── MEDIAPIPE ────────────────────────────────────────────────────────────
async function loadMediaPipe() {
  loadStatus.textContent = 'Tải MediaPipe Hands...';
  loaderBar.style.width = '20%';
  return new Promise((resolve, reject) => {
    const s1 = document.createElement('script');
    s1.src = 'https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js';
    s1.onload = () => {
      const s2 = document.createElement('script');
      s2.src = 'https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js';
      s2.onload = () => { loaderBar.style.width = '60%'; loadStatus.textContent = 'Khởi tạo AI model...'; resolve(); };
      s2.onerror = reject;
      document.head.appendChild(s2);
    };
    s1.onerror = reject;
    document.head.appendChild(s1);
  });
}

async function initHandTracking() {
  const video = document.getElementById('cam-video');

  handDetector = new Hands({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
  });
  handDetector.setOptions({
    maxNumHands: 2,           // ← 2 tay
    modelComplexity: 1,
    minDetectionConfidence: 0.65,
    minTrackingConfidence: 0.55
  });
  handDetector.onResults(onHandResults);

  try {
    videoStream = await navigator.mediaDevices.getUserMedia({
      video: { width: 320, height: 240, facingMode: 'user', frameRate: { ideal: 30 } }
    });
    video.srcObject = videoStream;
    await video.play();
    loaderBar.style.width = '90%';
    loadStatus.textContent = 'Camera sẵn sàng!';

    // Kiểm tra Camera utils đã load chưa
    if (typeof Camera === 'undefined') {
      throw new Error('Camera utils chưa load xong');
    }

    const mpCam = new Camera(video, {
      onFrame: async () => { if (handDetector) await handDetector.send({ image: video }); },
      width: 320, height: 240
    });
    mpCam.start();
  } catch (e) {
    loadStatus.textContent = '⚠️ Không thể truy cập camera: ' + e.message;
    throw e;
  }
}

// ─── GESTURE RECOGNITION ──────────────────────────────────────────────────
function dist2D(a, b) {
  return Math.sqrt((a.x-b.x)**2 + (a.y-b.y)**2);
}

function recognizeGesture(lm) {
  const WRIST=lm[0], THUMB_TIP=lm[4], INDEX_TIP=lm[8],
        MIDDLE_TIP=lm[12], RING_TIP=lm[16], PINKY_TIP=lm[20],
        MIDDLE_MCP=lm[9], THUMB_IP=lm[3];

  const fingerUp = (tip, pip) => tip.y < pip.y;
  const indexUp  = fingerUp(INDEX_TIP, lm[6]);
  const middleUp = fingerUp(MIDDLE_TIP, lm[10]);
  const ringUp   = fingerUp(RING_TIP, lm[14]);
  const pinkyUp  = fingerUp(PINKY_TIP, lm[18]);

  const allDown = !indexUp && !middleUp && !ringUp && !pinkyUp;

  const pinchDist = dist2D(THUMB_TIP, INDEX_TIP);
  const handSize  = dist2D(WRIST, MIDDLE_MCP);
  const isPinch   = pinchDist < handSize * 0.3;

  const isOK     = isPinch && middleUp && ringUp && pinkyUp;
  const isFist   = allDown && !isPinch;
  const isOpen   = indexUp && middleUp && ringUp && pinkyUp;
  const isPeace  = indexUp && middleUp && !ringUp && !pinkyUp;
  const isPoint  = indexUp && !middleUp && !ringUp && !pinkyUp;

  if (isOK)    return { name:'OK',      icon:'👌', pinchDist, handSize };
  if (isFist)  return { name:'FIST',    icon:'✊', pinchDist, handSize };
  if (isPinch) return { name:'PINCH',   icon:'🤏', pinchDist, handSize };
  if (isOpen)  return { name:'OPEN',    icon:'🖐️', pinchDist, handSize };
  if (isPeace) return { name:'PEACE',   icon:'✌️', pinchDist, handSize };
  if (isPoint) return { name:'POINT',   icon:'👆', pinchDist, handSize };
  return         { name:'NEUTRAL', icon:'✋', pinchDist, handSize };
}

function onHandResults(results) {
